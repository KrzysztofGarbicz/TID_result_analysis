expected_stages:
  - before_irradiate
  - after_irradiate
  - annealing_24h_25c
  - annealing_168h_25c
  - annealing_168h_100c

devices:
  TPS2553:
    measurements:
      enable_input_hysteresis:
        metrics:
          - measured_falling_v
          - measured_rising_v
      fault_and_latch:
        metrics:
          - fault_test
          - latch_test
      ilim_accuracy:
        contexts:
          - target_ilim_a=0.12
          - target_ilim_a=0.5
          - target_ilim_a=1.0
          - target_ilim_a=1.7
        metrics:
          - iterations
          - lower_no_trip_a
          - upper_trip_a
      iquiescent:
        metrics:
          - iq_ua
      ishutdown:
        metrics:
          - ish_ua
      overcurrent_trip_time:
        metrics:
          - fall_time_off_us
          - slew_rate_off_v_per_us
          - time_off_us
      rdson:
        contexts:
          - iload_a=0.1
          - iload_a=0.5
          - iload_a=1.0
        metrics:
          - vds_v
          - rdson_mohm
      short_circuit_response:
        metrics:
          - fall_time_off_us
          - slew_rate_off_v_per_us
          - time_off_us
      time_on:
        source_measurement_type: time_on_off
        metrics:
          - rise_time_on_ms
          - slew_rate_on_v_per_us
          - time_on_ms
      time_off:
        source_measurement_type: time_on_off
        metrics:
          - fall_time_off_ms
          - slew_rate_off_v_per_us
          - time_off_ms
      timing_time_on:
        metrics:
          - time_to_10pct
          - time_to_90pct
          - vout_slew_rate
      timing_time_off:
        metrics:
          - time_to_10pct
          - time_to_90pct
          - vout_slew_rate
      timing_overcurrent_trip_time:
        metrics:
          - overcurrent_to_10pct
          - overcurrent_to_95pct
          - vout_slew_rate
      timing_short_circuit_response:
        metrics:
          - short_circuit_response
          - vout_slew_rate

  TPS259474:
    measurements:
      enable_input_hysteresis:
        metrics:
