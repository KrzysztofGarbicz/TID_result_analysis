          - iload_a=0.1
          - iload_a=0.5
          - iload_a=1.0
          - iload_a=2.0
          - iload_a=3.0
        metrics:
          - vds_v
          - rdson_mohm
      short_circuit_response:
        metrics:
          - fall_time_off_us
          - slew_rate_off_v_per_us
          - time_off_us
      time_on:
        source_measurement_type: time_on_off
        metrics:
          - rise_time_on_ms
          - slew_rate_on_v_per_us
          - time_on_ms
      time_off:
        source_measurement_type: time_on_off
        metrics:
          - fall_time_off_ms
          - slew_rate_off_v_per_us
          - time_off_ms
      timing_time_on:
